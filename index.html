    const useInView = (options = {}) => {
      const ref = useRef(null);
      const [isInView, setIsInView] = useState(false);

      useEffect(() => {
        if (!ref.current) return;
        const observer = new IntersectionObserver(([entry]) => {
          if (entry.isIntersecting) {
            setIsInView(true);
            if (options.triggerOnce) {
              observer.unobserve(entry.target);
            }
          } else {
            if (!options.triggerOnce) {
              setIsInView(false);
            }
          }
        }, { threshold: 0.1, ...options });

        observer.observe(ref.current);
        return () => observer.disconnect();
      }, [options.triggerOnce]);

      return [ref, isInView];
    };

    const MotionDiv = ({ children, className = '', delay = 0, duration = 600, ...props }) => {

      const delayStyle = { transitionDelay: `${delay}ms`, transitionDuration: `${duration}ms` };

    const AnimatedCounter = ({ value, duration = 2000 }) => {
      const [count, setCount] = useState(0);
      const ref = useRef(null);
      const [hasAnimated, setHasAnimated] = useState(false);

      useEffect(() => {
        const observer = new IntersectionObserver(([entry]) => {
          if (entry.isIntersecting && !hasAnimated) {
            setHasAnimated(true);
            let start = null;
            const end = parseInt(value.replace(/,/g, ''), 10);
            
            const step = (timestamp) => {
              if (!start) start = timestamp;
              const elapsed = timestamp - start;
              const progress = Math.min(elapsed / duration, 1);
              const easeOut = 1 - Math.pow(1 - progress, 4); // Quartic ease out
              setCount(Math.floor(easeOut * end));
              
              if (progress < 1) {
                window.requestAnimationFrame(step);
              } else {
                setCount(end);
              }
            };
            window.requestAnimationFrame(step);
          }
        }, { threshold: 0.1 });

        if (ref.current) observer.observe(ref.current);
        return () => observer.disconnect();
      }, [value, duration, hasAnimated]);

      return (
        <span ref={ref} className="tabular-nums">
          {count.toLocaleString()}{value.includes('+') ? '+' : value.includes('%') ? '%' : ''}
        </span>
      );
    };

        setSliderPosition(position);
      }, []);

      const handleMouseMove = useCallback((e) => {
        if (!isDragging) return;
        handleMove(e.clientX);
      }, [isDragging, handleMove]);

      const handleTouchMove = useCallback((e) => {
        if (!isDragging) return;
        if (e.touches && e.touches[0]) {
          handleMove(e.touches[0].clientX);
        }
      }, [isDragging, handleMove]);

      const handleStart = () => setIsDragging(true);
      const handleStop = () => setIsDragging(false);

      useEffect(() => {
        if (isDragging) {
          window.addEventListener('mouseup', handleStop);
          window.addEventListener('touchend', handleStop);
        }
        return () => {
          window.removeEventListener('mouseup', handleStop);
          window.removeEventListener('touchend', handleStop);
        };
      }, [isDragging]);

      return (
        <div 
          ref={containerRef} 
          className="relative w-full aspect-[4/3] rounded-3xl overflow-hidden shadow-double select-none touch-none cursor-ew-resize border border-[#DFBA84]/20 z-10 no-select"
          onMouseDown={handleStart}
          onTouchStart={handleStart}
          onMouseMove={handleMouseMove}
          onTouchMove={handleTouchMove}

    /* ==========================================
       Interactive Progressive Booking Terminal & Map (Teal-Gold Mesh BG)
       ========================================== */
    const Booking = ({ selectedService, onSubmitSuccess }) => {
      const [currentStep, setCurrentStep] = useState(1);
      const [formData, setFormData] = useState({
        name: '',
        phone: '',
        email: '',
        date: '',
        time: '',
        treatment: '',
        message: ''
      });
      const [errors, setErrors] = useState({});
      const [isSubmitting, setIsSubmitting] = useState(false);

      useEffect(() => {
        if (selectedService) {
          setFormData((prev) => ({ ...prev, treatment: selectedService }));
          setCurrentStep(1); // Set to step 1 so they see the pre-selection
        }
      }, [selectedService]);

      const handleInputChange = (e) => {
        const { name, value } = e.target;
        setFormData((prev) => ({ ...prev, [name]: value }));
        if (errors[name]) {
          setErrors((prev) => ({ ...prev, [name]: null }));
        }
      };

      const validateStep1 = () => {
        const err = {};
        if (!formData.treatment) err.treatment = 'Please select a treatment service';
        setErrors(err);
        return Object.keys(err).length === 0;
      };

      const validateStep2 = () => {
        const err = {};
        if (!formData.date) err.date = 'Preferred date is required';
        if (!formData.time) err.time = 'Preferred time slot is required';
        setErrors(err);
        return Object.keys(err).length === 0;
      };

      const validateStep3 = () => {
        const err = {};
        if (!formData.name.trim()) err.name = 'Full name is required';
        if (!formData.phone.trim()) {
          err.phone = 'Phone number is required';
        } else if (!/^\+?[0-9\s-]{10,14}$/.test(formData.phone.trim())) {
          err.phone = 'Please enter a valid phone number';
        }
        if (!formData.email.trim()) {
          err.email = 'Email address is required';
        } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(formData.email.trim())) {
          err.email = 'Please enter a valid email address';
        }

        setErrors(err);
        return Object.keys(err).length === 0;
      };

      const handleNext = () => {
        if (currentStep === 1 && validateStep1()) setCurrentStep(2);
        if (currentStep === 2 && validateStep2()) setCurrentStep(3);
      };

      const handlePrev = () => {
        setCurrentStep((prev) => Math.max(1, prev - 1));
      };

      const handleFormSubmit = async (e) => {
        e.preventDefault();
        if (validateStep3()) {
          setIsSubmitting(true);
          
          let dbSuccess = true;
          let dbErrorMsg = null;
          const appointmentId = `DL-${Math.floor(100000 + Math.random() * 900000)}`;
          
          const timePart = formData.time ? `[Preferred Time: ${formData.time}]` : '';
          const msgPart = formData.message.trim();
          const dbMessage = `[Ref: ${appointmentId}] ${timePart} ${msgPart}`.replace(/\s+/g, ' ').trim();

          if (anonSupabaseClient) {
            try {
              const { error } = await anonSupabaseClient
                .from('appointments')
                .insert([
                  {
                    name: formData.name.trim(),
                    phone: formData.phone.trim(),
                    email: formData.email.trim(),
                    date: formData.date,
                    treatment: formData.treatment,
                    message: dbMessage,
                    created_at: new Date().toISOString()
                  }
                ]);
              
              if (error) {
                console.error("Supabase insert error:", error);
                dbSuccess = false;
                dbErrorMsg = error.message || JSON.stringify(error);
              }
            } catch (err) {
              console.error("Supabase connection exception:", err);
              dbSuccess = false;
              dbErrorMsg = err.message || String(err);
            }
          } else {
            dbSuccess = false;
            dbErrorMsg = "Supabase client not initialized (window.supabase is undefined)";
          }

          setIsSubmitting(false);

          if (dbSuccess) {
            triggerWhatsAppConfirmation({
              id: appointmentId,
              name: formData.name.trim(),
              phone: formData.phone.trim(),
              email: formData.email.trim(),
              date: formData.date,
              time: formData.time,
              notes: formData.message.trim()
            });

            onSubmitSuccess(formData.name, true);
            setFormData({ name: '', phone: '', email: '', date: '', time: '', treatment: '', message: '' });
            setCurrentStep(1);
          } else {
            onSubmitSuccess(formData.name, false, dbErrorMsg);
          }
        }
      };

      return (
        <section id="contact" className="py-24 bg-gradient-to-br from-[#EEF7F6] via-[#FAF9F6] to-[#F2EFE9] relative overflow-hidden">
          <div className="absolute bottom-0 left-0 w-96 h-96 bg-secondary/5 rounded-full blur-3xl"></div>
          
          <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 relative z-10">
            <div className="grid grid-cols-1 lg:grid-cols-12 gap-12 lg:gap-16 items-start">
              
              {/* Progressive Booking Form terminal */}
              <div className="lg:col-span-7 text-left w-full">
                <span className="inline-block bg-primary/5 border border-primary/10 text-primary font-sans font-bold text-xs tracking-widest uppercase rounded-full px-4.5 py-2.5 mb-3">
                  Aesthetic Scheduler
                </span>
                <h2 className="font-serif text-3xl sm:text-4xl font-medium text-primary leading-tight">
                  Book Your Skin Analysis
                </h2>
                <p className="text-slate-500 font-sans text-xs sm:text-sm mt-3 mb-8 leading-relaxed">
                  Experience scientific, non-ablative skincare. Navigate our structural progressive booking terminal to schedule your slot.
                </p>

                {/* Progress Indicators */}
                <div className="flex items-center gap-2 mb-8 bg-[#FAF6EE]/90 border border-slate-200/50 p-2 rounded-2xl">
                  {[1, 2, 3].map((st) => (
                    <div 
                      key={st}
                      className={`flex-grow text-center py-2.5 rounded-xl font-sans font-bold text-[10px] sm:text-xs uppercase tracking-wider transition-all duration-300 ${
                        currentStep === st 
                          ? 'bg-primary text-white shadow-sm'
                          : currentStep > st 
                            ? 'bg-secondary/10 text-secondary' 
                            : 'text-slate-400 font-medium'
                      }`}
                    >
                      Step {st}: {st === 1 ? 'Concern' : st === 2 ? 'Schedule' : 'Details'}
                    </div>
                  ))}
                </div>

                <div className="bg-white border border-slate-100 rounded-3xl p-6 sm:p-8 shadow-double">
                  <form onSubmit={handleFormSubmit} className="space-y-6">
                    
                    {/* Step 1: Concern & Service */}
                    {currentStep === 1 && (
                      <div className="space-y-4 animate-[fadeIn_0.3s_ease-out]">
                        <h4 className="font-serif text-base font-bold text-primary mb-1">Select Skincare Concern</h4>
                        <div className="flex flex-col text-left">
                          <label htmlFor="treatment" className="text-xs font-bold text-slate-655 font-sans mb-2">Clinic Service <span className="text-red-500">*</span></label>
                          <select
                            id="treatment"
                            name="treatment"
                            value={formData.treatment}
                            onChange={handleInputChange}
                            className={`bg-[#FAF9F6] border ${errors.treatment ? 'border-red-400 focus:ring-red-200' : 'border-slate-150 focus:ring-secondary/20'} focus:border-secondary focus:bg-white rounded-xl px-4 py-3.5 text-xs sm:text-sm text-slate-600 transition-all focus:ring-4 focus:outline-none`}
                          >
                            <option value="">-- Choose target treatment --</option>
                            {SERVICES_DATA.map((srv) => (
                              <option key={srv.id} value={srv.name}>{srv.name} (Efficacy: {srv.efficacy})</option>
                            ))}
                          </select>
                          {errors.treatment && <span className="text-red-500 text-[10px] font-bold mt-1.5 pl-1">{errors.treatment}</span>}
                        </div>
                        <div className="flex justify-end pt-4">
                          <button
                            type="button"
                            onClick={handleNext}
                            className="bg-primary hover:bg-slate-800 text-white font-sans font-bold text-xs uppercase tracking-wider px-8 py-3.5 rounded-full transition-transform active:scale-95 flex items-center gap-1.5 shadow"
                          >
                            Continue <Icon name="arrow-right" className="w-4 h-4 text-white" />
                          </button>
                        </div>
                      </div>
                    )}

                    {/* Step 2: Preferred Date */}
                    {currentStep === 2 && (
                      <div className="space-y-4 animate-[fadeIn_0.3s_ease-out]">
                        <h4 className="font-serif text-base font-bold text-primary mb-1">Select Consultation Schedule</h4>
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                          <div className="flex flex-col text-left">
                            <label htmlFor="date" className="text-xs font-bold text-slate-655 font-sans mb-2">Preferred Appointment Date <span className="text-red-500">*</span></label>
                            <input
                              type="date"
                              id="date"
                              name="date"
                              value={formData.date}
                              onChange={handleInputChange}
                              className={`bg-[#FAF9F6] border ${errors.date ? 'border-red-400 focus:ring-red-200' : 'border-slate-150 focus:ring-secondary/20'} focus:border-secondary focus:bg-white rounded-xl px-4 py-3.5 text-xs sm:text-sm text-slate-600 transition-all focus:ring-4 focus:outline-none`}
                            />
                            {errors.date && <span className="text-red-500 text-[10px] font-bold mt-1.5 pl-1">{errors.date}</span>}
                          </div>
                          
                          <div className="flex flex-col text-left">
                            <label htmlFor="time" className="text-xs font-bold text-slate-655 font-sans mb-2">Preferred Time Slot <span className="text-red-500">*</span></label>
                            <select
                              id="time"
                              name="time"
                              value={formData.time}
                              onChange={handleInputChange}
                              className={`bg-[#FAF9F6] border ${errors.time ? 'border-red-400 focus:ring-red-200' : 'border-slate-150 focus:ring-secondary/20'} focus:border-secondary focus:bg-white rounded-xl px-4 py-3.5 text-xs sm:text-sm text-slate-600 transition-all focus:ring-4 focus:outline-none`}
                            >
                              <option value="">-- Choose time slot --</option>
                              <option value="10:00 AM - 11:00 AM">10:00 AM - 11:00 AM</option>
                              <option value="11:00 AM - 12:00 PM">11:00 AM - 12:00 PM</option>
                              <option value="12:00 PM - 01:00 PM">12:00 PM - 01:00 PM</option>
                              <option value="02:00 PM - 03:00 PM">02:00 PM - 03:00 PM</option>
                              <option value="03:00 PM - 04:00 PM">03:00 PM - 04:00 PM</option>
                              <option value="04:00 PM - 05:00 PM">04:00 PM - 05:00 PM</option>
                              <option value="05:00 PM - 06:00 PM">05:00 PM - 06:00 PM</option>
                              <option value="06:00 PM - 07:00 PM">06:00 PM - 07:00 PM</option>
                            </select>
                            {errors.time && <span className="text-red-500 text-[10px] font-bold mt-1.5 pl-1">{errors.time}</span>}
                          </div>
                        </div>
                        <div className="flex justify-between pt-4">
                          <button
                            type="button"
                            onClick={handlePrev}
                            className="bg-slate-100 hover:bg-slate-200 text-slate-700 font-sans font-bold text-xs uppercase tracking-wider px-8 py-3.5 rounded-full transition-transform active:scale-95 flex items-center gap-1.5"
                          >
                            <Icon name="arrow-left" className="w-4 h-4" /> Back
                          </button>
                          <button

      const [isLoggingIn, setIsLoggingIn] = useState(false);
      const [email, setEmail] = useState('vizady956@gmail.com');
      const [password, setPassword] = useState('Vizad@2026');
      const [errorMsg, setErrorMsg] = useState('');
      const [bookings, setBookings] = useState([]);

      const checkAdminRegistrationStatus = useCallback(async () => {
        if (!supabaseClient) {
          setIsCheckingAdmin(false);
          return;
        }
        try {
          const { data, error } = await supabaseClient
            .from('admin_profile')
            .select('id');
          
          if (error) {
            console.error("Error reading admin_profile:", error);
            setAdminExists(false);
          } else {
            setAdminExists(data && data.length > 0);
          }
        } catch (err) {
          console.error("Exception checking admin registration:", err);
          setAdminExists(false);
        } finally {
          setIsCheckingAdmin(false);
        }
      }, []);

      useEffect(() => {
        if (!supabaseClient) return;

        supabaseClient.auth.getSession().then(({ data: { session } }) => {
          if (session) {
            setSession(session);
            fetchBookings();
          }
        });

        const { data: { subscription } } = supabaseClient.auth.onAuthStateChange((_event, session) => {
          setSession(session);
          if (session) {
            fetchBookings();
          } else {
            setBookings([]);
          }
        });

        checkAdminRegistrationStatus();

        return () => subscription.unsubscribe();
      }, [checkAdminRegistrationStatus]);

      const fetchBookings = async () => {
        if (!supabaseClient) return;
        setIsLoadingBookings(true);
        try {
          const { data, error } = await supabaseClient
            .from('appointments')
            .select('*')
            .order('date', { ascending: false });
          if (error) throw error;
          setBookings(data || []);
        } catch (err) {
          console.error("Error fetching bookings:", err);
        } finally {
          setIsLoadingBookings(false);
        }

        e.preventDefault();
        if (!email.trim() || !password.trim()) {
          setErrorMsg("Please enter both email and password.");
          return;
        }
        setIsLoggingIn(true);
        setErrorMsg('');
        try {
          const { data, error } = await supabaseClient.auth.signUp({
            email: email.trim(),
            password: password.trim(),
          });
          
          if (error) throw error;
          if (!data.user) throw new Error("Sign up failed.");

          const { error: profileError } = await supabaseClient
            .from('admin_profile')
            .insert([{ id: data.user.id, email: data.user.email }]);
          
          if (profileError && profileError.code !== '23505') {
            throw profileError;
          }

          setSession(data.session);
          setAdminExists(true);
        } catch (err) {
          setErrorMsg(err.message || "Failed to create administrator account.");
        } finally {
          setIsLoggingIn(false);
        }
      };

      const handleLogin = async (e) => {
        e.preventDefault();
        if (!email.trim() || !password.trim()) {
          setErrorMsg("Please enter both email and password.");
          return;
        }
        setIsLoggingIn(true);
        setErrorMsg('');
        try {
          const { data, error } = await supabaseClient.auth.signInWithPassword({
            email: email.trim(),
            password: password.trim(),
          });
          if (error) throw error;

          const { data: profileCheck, error: checkError } = await supabaseClient
            .from('admin_profile')
            .select('id')
            .eq('id', data.user.id);

          if (checkError || !profileCheck || profileCheck.length === 0) {
            await supabaseClient.auth.signOut();
            throw new Error("Access Denied: This account is not registered as an administrator.");
          }

          setSession(data.session);
        } catch (err) {
          setErrorMsg(err.message || "Login failed. Please check credentials.");
        } finally {
          setIsLoggingIn(false);
        }
      };

      const handleLogout = async () => {
        if (!supabaseClient) return;
        await supabaseClient.auth.signOut();
        setSession(null);
      };

      const handleDeleteBooking = async (id) => {
        if (!window.confirm("Are you sure you want to delete this booking record?")) return;
        try {
          const { error } = await supabaseClient
            .from('appointments')
            .delete()
            .eq('id', id);
          if (error) throw error;
          fetchBookings();
        } catch (err) {
          alert("Failed to delete booking: " + err.message);
        }
      };

      const handleCompleteBooking = async (id) => {
        if (!supabaseClient) return;
        
        const booking = bookings.find((b) => b.id === id);
        let waWindow = null;
        
        if (booking) {
          const cleanPhone = booking.phone.replace(/[^\d+]/g, '');
          let formattedPhone = cleanPhone;
          if (!formattedPhone.startsWith('+') && formattedPhone.length === 10) {
            formattedPhone = '91' + formattedPhone;
          } else if (formattedPhone.startsWith('+')) {
            formattedPhone = formattedPhone.replace('+', '');
          }

          let formattedDate = booking.date;
          try {
            formattedDate = new Date(booking.date).toLocaleDateString('en-IN', { 
              weekday: 'long', 
              year: 'numeric', 
              month: 'long', 
              day: 'numeric' 
            });
          } catch (e) {
            console.error(e);
          }

          const config = getWhatsAppConfig();
          const clinicName = config?.clinicDetails?.name || 'Dr. Priya Sharma Clinic';
          const doctorName = config?.clinicDetails?.doctorName || 'Dr. Priya Sharma';

          const message = `Hello ${booking.name} 👋,\n\n` +
            `✅ Your appointment at ${clinicName} has been confirmed!\n\n` +
            `📋 Appointment Details:\n` +
            `👩‍⚕️ Doctor: ${doctorName}\n` +
            `📅 Date: ${formattedDate}\n` +
            `✨ Procedure: ${booking.treatment}\n` +
            `✅ Status: Confirmed\n\n` +
            `😊 We look forward to welcoming you. If you have any questions or need assistance, please don't hesitate to contact us. 📞💬\n\n` +
            `Thank you for choosing ${clinicName}! 🌟`;

          const whatsappUrl = `https://wa.me/${formattedPhone}?text=${encodeURIComponent(message)}`;
          waWindow = window.open(whatsappUrl, '_blank');
        }

        try {
          const { error } = await supabaseClient
            .from('appointments')
            .update({ status: 'completed' })
            .eq('id', id);
          if (error) throw error;
          
          fetchBookings();
        } catch (err) {
          if (waWindow) waWindow.close();
          
          if (err.message && err.message.includes('column "status"')) {
            alert("Database Error: The 'status' column is missing from your 'appointments' table. Please run the SQL migration script provided in the chat to update your database table.");
          } else {
            alert("Failed to complete booking: " + err.message);
          }
        }
      };

      const filteredBookings = bookings.filter((b) => {
        const query = searchQuery.toLowerCase();
        return (
          b.name.toLowerCase().includes(query) ||
          b.email.toLowerCase().includes(query) ||
          b.phone.toLowerCase().includes(query) ||
          b.treatment.toLowerCase().includes(query) ||

            </div>

              {activeTab === 'bookings' && (

                  </div>

                  {whatsappLogs.length === 0 ? (
                    <div className="p-16 text-center text-slate-400">
                      <div className="bg-slate-50 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 border border-slate-100">
                        <Icon name="message-square" className="w-7 h-7 text-slate-400" />
                      </div>
                      <h5 className="font-serif text-base font-bold text-primary mb-1">No Delivery Logs Found</h5>
                      <p className="text-xs text-slate-400 font-sans">
                        No automated messages have been sent or logged on this device yet.
                      </p>
                    </div>
                  ) : (
                    <div className="overflow-x-auto w-full">
                      <table className="w-full min-w-[700px] border-collapse font-sans text-xs sm:text-sm">
                        <thead>
                          <tr className="bg-[#FAF9F6] border-b border-slate-200/50 text-[10px] font-bold text-slate-400 uppercase tracking-widest">
                            <th className="px-6 py-4 text-left">Timestamp</th>
                            <th className="px-6 py-4 text-left">Recipient</th>
                            <th className="px-6 py-4 text-left">Status</th>
                            <th className="px-6 py-4 text-left">Provider</th>
                            <th className="px-6 py-4 text-left">Message Details</th>
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-slate-100">
                          {whatsappLogs.map((log, index) => {
                            const dateStr = new Date(log.timestamp).toLocaleString('en-IN', {
                              day: 'numeric', month: 'short', year: 'numeric',
                              hour: '2-digit', minute: '2-digit'
                            });
                            
                            let statusColor = 'bg-slate-100 text-slate-500 border-slate-200';
                            if (log.status === 'success') statusColor = 'bg-emerald-50 text-emerald-600 border-emerald-100';
                            if (log.status === 'failed') statusColor = 'bg-red-50 text-red-600 border-red-100';
                            if (log.status === 'skipped_disabled') statusColor = 'bg-amber-50 text-amber-600 border-amber-100';

                            return (
                              <tr key={index} className="hover:bg-slate-50/50 transition-colors">
                                <td className="px-6 py-4 font-mono text-[11px] text-slate-500">{dateStr}</td>
                                <td className="px-6 py-4 text-left">
                                  <h6 className="font-bold text-slate-800">{log.patientName}</h6>
                                  <span className="text-[10px] text-slate-400 font-semibold block mt-0.5">{log.patientPhone}</span>
                                </td>
                                <td className="px-6 py-4">
                                  <span className={`inline-block text-[9px] font-bold uppercase tracking-wider px-2.5 py-0.5 rounded-full border ${statusColor}`}>
                                    {log.status.replace('_', ' ')}
                                  </span>
                                </td>
                                <td className="px-6 py-4">
                                  <span className="text-[10px] font-bold uppercase tracking-wider text-slate-500 bg-slate-100 px-2 py-0.5 rounded-md">
                                    {log.provider}
                                  </span>
                                </td>
                                <td className="px-6 py-4 max-w-sm">
                                  {log.status === 'failed' && (
                                    <div className="bg-red-50/50 border border-red-100 text-red-600 p-2.5 rounded-xl text-[11px] mb-2 flex items-start gap-1">
                                      <Icon name="alert-triangle" className="w-3.5 h-3.5 shrink-0 text-red-500 mt-0.5" />
                                      <span className="font-medium text-wrap break-words">{log.error}</span>
                                    </div>
                                  )}
                                  <p className="text-slate-500 text-[11px] leading-relaxed whitespace-pre-line border border-slate-100 p-2.5 bg-slate-50/50 rounded-xl" title={log.message}>
                                    {log.message || <em className="text-slate-400">No message prefill logged</em>}
                                  </p>
                                </td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                  )}
                </div>
              )}

              {/* Tab 3: WhatsApp Gateway Settings */}
              
            </div>
          )}
        </div>
      );
    };

    /* ==========================================
       APP CONTAINER (CORE ROOT)
       ========================================== */
    const App = () => {
      const [activeSection, setActiveSection] = useState('home');
      const [selectedService, setSelectedService] = useState(null);
      const [bookingPresetService, setBookingPresetService] = useState('');
      const [toastMessage, setToastMessage] = useState(null);
      const [toastType, setToastType] = useState('success');
      const [isAdminMode, setIsAdminMode] = useState(false);

      // Scroll tracker for navigation anchors
      useEffect(() => {
        const sections = ['home', 'about', 'services', 'gallery', 'testimonials'];
        const observers = sections.map((secId) => {
          const el = document.getElementById(secId);
          if (!el) return null;
          
          const observer = new IntersectionObserver(([entry]) => {
            if (entry.isIntersecting) {
              setActiveSection(secId);
            }
          }, { threshold: 0.15, rootMargin: '-15% 0px -65% 0px' });

          observer.observe(el);
          return { observer, el };
        });

        return () => {
          observers.forEach((obsObj) => {
            if (obsObj) obsObj.observer.unobserve(obsObj.el);
          });
        };
      }, []);

      const handleOpenServiceModal = (service) => {
        setSelectedService(service);
      };

      const handleCloseServiceModal = () => {
        setSelectedService(null);
      };

      const handleBookTreatmentFromModal = (treatmentName) => {
        setBookingPresetService(treatmentName);
        setSelectedService(null);
        const contactSection = document.getElementById('contact');
        if (contactSection) {
          contactSection.scrollIntoView({ behavior: 'smooth' });
        }
      };

      const handleBookAppointmentFromNav = () => {
        const contactSection = document.getElementById('contact');
        if (contactSection) {
          contactSection.scrollIntoView({ behavior: 'smooth' });
        }
      };

      const handleBookSpecialtyFromHero = (treatmentName, code) => {
        const matchingService = SERVICES_DATA.find(s => s.id === code);
        if (matchingService) {
          setSelectedService(matchingService);
        } else {
          setBookingPresetService(treatmentName);
          const contactSection = document.getElementById('contact');
          if (contactSection) contactSection.scrollIntoView({ behavior: 'smooth' });
        }
      };

      const handleFormSubmitSuccess = (patientName, isDbSuccess = true, errorDetails = null) => {
        if (isDbSuccess) {
          setToastType('success');
          setToastMessage(`Thank you, ${patientName}! Your consultation request was received. We will contact you soon.`);
        } else {
          setToastType('error');
          setToastMessage(`Sorry, ${patientName}, database error: ${errorDetails || 'Connection failed'}. Please try again.`);
        }
        setBookingPresetService('');
        setTimeout(() => setToastMessage(null), 10000);
      };

      return (
        <div className="min-h-screen relative flex flex-col justify-between">
          
          {/* Navigation */}
          {!isAdminMode && (
            <Navbar 
              activeSection={activeSection} 
              onBookAppointmentClick={handleBookAppointmentFromNav} 
            />
          )}

          {/* Floating Toast Alert */}
          {toastMessage && (
            <div className={`fixed top-6 left-1/2 transform -translate-x-1/2 z-[100] bg-slate-900 border ${toastType === 'success' ? 'border-emerald-500/20' : 'border-red-500/20'} text-white font-sans font-bold text-xs sm:text-sm px-6 py-4 rounded-2xl shadow-premium flex items-center gap-3 animate-[bounce_0.5s_ease-out]`}>
              <div className={`${toastType === 'success' ? 'bg-emerald-500' : 'bg-red-500'} p-1.5 rounded-full flex items-center justify-center shrink-0`}>
                <Icon name={toastType === 'success' ? 'check' : 'alert-triangle'} className="w-4 h-4 text-white" />
              </div>
              <span>{toastMessage}</span>
              <button 
                onClick={() => setToastMessage(null)}
                className="text-slate-400 hover:text-white pl-2 focus:ring-2 focus:ring-secondary rounded"
                aria-label="Dismiss toast"
              >
                <Icon name="x" className="w-4 h-4" />
              </button>
            </div>
          )}

          {/* Main sections */}
          <main className="flex-grow flex flex-col items-center">
            {isAdminMode ? (
              <AdminPanel onBack={() => setIsAdminMode(false)} />
            ) : (
              <>
                {/* Hero Portal with concern diagnostic */}
                <Hero 
                  onBookClick={handleBookAppointmentFromNav} 
                  onViewTreatmentsClick={() => {
                    const srvSection = document.getElementById('services');
                    if (srvSection) srvSection.scrollIntoView({ behavior: 'smooth' });
                  }}
                  onBookSpecialty={handleBookSpecialtyFromHero}
                />

                {/* Counters */}
                <Stats />

                {/* Biography details */}
                <About />

                {/* advanced Clinical Services */}
                <Services onLearnMoreClick={handleOpenServiceModal} />

                {/* safety Frameworks (STUNNING Dark Midnight Blue BG) */}
                <WhyUs />

                {/* real Drag swipe comparative Gallery */}
                <Gallery />

                {/* Progressive scheduler terminal & Bandra maps */}
                <Booking 
                  selectedService={bookingPresetService} 
                  onSubmitSuccess={handleFormSubmitSuccess} />

                {/* Verified Patient testimonials */}
                <Testimonials />

                {/* accordion FAQ */}
                <FAQ />
              </>
            )}
          </main>

          {/* Footer */}
          {!isAdminMode && <Footer onAdminClick={() => setIsAdminMode(true)} />}

          {/* Float controllers */}
          {!isAdminMode && <FloatActions />}

          {/* Procedure Detail Modal overlay */}
          {!isAdminMode && selectedService && (
            <ServiceModal 
              service={selectedService} 
              onClose={handleCloseServiceModal} 
              onBookTreatment={handleBookTreatmentFromModal} 
            />
          )}

        </div>
      );
    };

    // Render App
    const rootElement = document.getElementById('root');
    const root = ReactDOM.createRoot(rootElement);
    root.render(<App />);

  </script>
</body>
</html>
